services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: chuquis_coffee-app
    container_name: chuquis_coffee-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - chuquis_coffee-network
    depends_on:
      - mysql
      - redis

  vite:
    image: node:20-bookworm-slim
    container_name: chuquis_coffee-vite
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - node_modules:/var/www/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    networks:
      - chuquis_coffee-network

  web:
    image: nginx:alpine
    container_name: chuquis_coffee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chuquis_coffee-network
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: chuquis_coffee-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - chuquis_coffee-network
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    container_name: chuquis_coffee-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - chuquis_coffee-network
    ports:
      - "6379:6379"

networks:
  chuquis_coffee-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  node_modules: